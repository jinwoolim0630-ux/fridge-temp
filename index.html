<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>병원 온도 점검 시스템</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #f4f7f6; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .label { font-size: 14px; color: #666; margin-bottom: 5px; font-weight: bold; }
        input, button, select { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { background: #0056b3; transform: scale(0.98); }
        .info-box { background: #eef7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        .info-item { margin: 5px 0; font-size: 16px; }
        #status-msg { text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>온도 점검 시스템</h2>

    <div class="info-box">
        <div class="info-item">📍 <b>위치:</b> <span id="display-room">확인불가</span></div>
        <div class="info-item">❄️ <b>장비:</b> <span id="display-device">확인불가</span></div>
    </div>

    <div class="label">점검자 성함</div>
    <input type="text" id="userName" placeholder="이름을 입력하세요 (자동 저장됨)">

    <div class="label">점검 회차</div>
    <select id="checkTime">
        <option value="오전">오전 점검</option>
        <option value="오후">오후 점검</option>
    </select>

    <div class="label">현재 온도 (℃)</div>
    <input type="number" id="tempValue" step="0.1" inputmode="decimal" placeholder="숫자만 입력 (예: 4.5)">

    <button id="submitBtn" onclick="submitData()">데이터 저장하기</button>
    <div id="status-msg"></div>
</div>

<script>
    // [중요] 여기에 본인의 구글 앱스크립트 웹 앱 URL을 넣으세요.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYpJ_AELXK_Tni7vOC5D9SRH98TNweFFT3oTUTrFlR241XMxbWb3bV0kPqgEgnHZ7y/exec";

    // 1. 페이지 로드 시 주소창의 파라미터(?room=...&device=...) 읽기
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room');
    const device = urlParams.get('device');

    // 2. 이름 자동 불러오기 (기존 기록이 있다면)
    document.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('hospital_user_name');
        if (savedName) {
            document.getElementById('userName').value = savedName;
        }

        if (room && device) {
            document.getElementById('display-room').innerText = room;
            document.getElementById('display-device').innerText = device;
        } else {
            alert("잘못된 접근입니다. 장비 QR코드를 통해 접속해주세요.");
        }
    });

    // 3. 데이터 전송 함수
    async function submitData() {
        const user = document.getElementById('userName').value.trim();
        const temp = document.getElementById('tempValue').value;
        const checkTime = document.getElementById('checkTime').value;
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status-msg');

        if (!user || !temp) {
            alert("이름과 온도를 모두 입력해주세요.");
            return;
        }

        // 이름 로컬 저장소에 저장 (다음 점검 시 자동 입력)
        localStorage.setItem('hospital_user_name', user);

        btn.disabled = true;
        btn.innerText = "전송 중...";
        status.innerText = "데이터를 보내는 중입니다...";

        const payload = {
            user: user,
            room: room,
            device: device,
            temp: temp,
            checkTime: checkTime
        };

        try {
            // 앱스크립트 서버로 전송
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();

            if (result.result === "success") {
                alert("✅ 성공적으로 저장되었습니다.");
                // 입력창 초기화 (이름 제외)
                document.getElementById('tempValue').value = "";
            } else if (result.result === "duplicate") {
                alert("❌ 중복 오류: " + result.message);
            } else {
                alert("⚠️ 에러: " + result.message);
            }
        } catch (e) {
            // 구글 앱스크립트 특성상 CORS 에러가 날 수 있으나 
            // 실제 데이터는 시트에 전송되었을 가능성이 높습니다.
            alert("전송 완료! (시트를 확인해주세요)");
            document.getElementById('tempValue').value = "";
        } finally {
            btn.disabled = false;
            btn.innerText = "데이터 저장하기";
            status.innerText = "";
        }
    }
</script>

</body>
</html>
