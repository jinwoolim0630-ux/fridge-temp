<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>온도 점검</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
padding:15px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
margin-top:12px;
font-size:18px;
border:none;
border-radius:8px;
background:#2c7be5;
color:white;
}

button:hover{
background:#1a5ed6;
}

input, select{
width:100%;
padding:14px;
font-size:18px;
margin-top:10px;
}

.hidden{
display:none;
}

#result{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>온도 점검</h2>

<!-- 사용자 입력 -->

<div id="userPage">

<p>사용자 이름</p>

<input id="username" placeholder="이름 입력">

<button onclick="saveUser()">다음</button>

</div>

<!-- 조제실 선택 -->

<div id="roomPage" class="hidden">

<p>조제실 선택</p>

<button onclick="selectRoom('지하2층 병동약국')">지하2층 병동약국</button>
<button onclick="selectRoom('0층 외래약국')">0층 외래약국</button>
<button onclick="selectRoom('3층 항암조제실')">3층 항암조제실</button>

</div>

<!-- 장비 선택 -->

<div id="devicePage" class="hidden">

<p id="roomTitle"></p>

<button onclick="selectDevice('냉장고1')">냉장고1</button>
<button onclick="selectDevice('냉장고2')">냉장고2</button>
<button onclick="selectDevice('냉장고3')">냉장고3</button>
<button onclick="selectDevice('실내온도')">실내온도</button>

<button onclick="backRoom()">← 조제실 선택</button>

</div>

<!-- 온도 입력 -->

<div id="inputPage" class="hidden">

<p id="deviceTitle"></p>

<input id="temp" type="number" step="0.1" placeholder="온도 입력">

<select id="time">
<option value="오전">오전</option>
<option value="오후">오후</option>
</select>

<button onclick="saveData()">저장</button>

<button onclick="backDevice()">← 장비 선택</button>

<p id="result"></p>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbz_EpFbc4EnI0O-5rM5fPDi5AbHPdm_KSY92hc96uc-Ah-pNAQyq1iMxLd2KrHfCZy5/exec"

let user=""
let room=""
let device=""

function saveUser(){

user=document.getElementById("username").value

if(user===""){
alert("이름을 입력하세요")
return
}

document.getElementById("userPage").classList.add("hidden")
document.getElementById("roomPage").classList.remove("hidden")

}

function selectRoom(r){

room=r

document.getElementById("roomTitle").innerText=r

document.getElementById("roomPage").classList.add("hidden")
document.getElementById("devicePage").classList.remove("hidden")

}

function selectDevice(d){

device=d

document.getElementById("deviceTitle").innerText=room+" / "+device

document.getElementById("devicePage").classList.add("hidden")
document.getElementById("inputPage").classList.remove("hidden")

}

function backRoom(){

document.getElementById("devicePage").classList.add("hidden")
document.getElementById("roomPage").classList.remove("hidden")

}

function backDevice(){

document.getElementById("inputPage").classList.add("hidden")
document.getElementById("devicePage").classList.remove("hidden")

}

function saveData(){

let temp=document.getElementById("temp").value
let time=document.getElementById("time").value

if(temp===""){
alert("온도를 입력하세요")
return
}

let today=new Date().toISOString().split("T")[0]

let data={
date:today,
time:time,
room:room,
device:device,
temperature:temp,
inspector:user
}

fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
document.getElementById("result").innerText="저장 완료"
document.getElementById("temp").value=""
})
.catch(err=>{
document.getElementById("result").innerText="저장 실패"
})

}

</script>

</body>

</html>
