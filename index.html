<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>온도 점검 기록</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
font-size:16px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#1a5ed6;
}

#result{
margin-top:15px;
text-align:center;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>온도 점검 기록</h2>

<label>측정 위치</label>
<select id="location">
<option value="fridge1">냉장고1</option>
<option value="fridge2">냉장고2</option>
<option value="fridge3">냉장고3</option>
<option value="room">실내온도</option>
</select>

<label>온도 (℃)</label>
<input type="number" id="temperature" step="0.1">

<label>점검 시간</label>
<select id="time">
<option value="오전">오전</option>
<option value="오후">오후</option>
</select>

<label>점검자</label>
<input type="text" id="inspector">

<button onclick="saveData()">저장</button>

<div id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyNaWh7TZyLjGQuIG0UNCOrQUKSCllBTIwm7SBojUIKzBKLE4ejRKLO7tM7Bbjg1iVdIw/exec";

function saveData(){

let location = document.getElementById("location").value;
let temperature = document.getElementById("temperature").value;
let time = document.getElementById("time").value;
let inspector = document.getElementById("inspector").value;

let today = new Date().toISOString().split("T")[0];

let data = {
date: today,
time: time,
location: location,
temperature: temperature,
inspector: inspector
};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(response=>{
document.getElementById("result").innerHTML="저장 완료";
})
.catch(error=>{
document.getElementById("result").innerHTML="저장 실패";
});

}

</script>

</body>
</html>
