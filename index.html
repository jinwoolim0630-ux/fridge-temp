<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
      .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
      h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
      .input-group { margin-bottom: 15px; }
      label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
      input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
      button { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
      button:hover { background-color: #0056b3; }
      #status { margin-top: 15px; text-align: center; font-weight: bold; }
      .log-table { width: 100%; margin-top: 30px; border-collapse: collapse; font-size: 12px; }
      .log-table th, .log-table td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
      .log-table th { background-color: #e9ecef; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>항암조제실 일일 온도 점검</h2>
      <form id="tempForm">
        <div class="input-group">
          <label>장비명</label>
          <input type="text" name="deviceName" placeholder="장비 이름을 입력하세요" required>
        </div>
        <div class="input-group">
          <label>현재 온도 (℃)</label>
          <input type="number" step="0.1" name="currentTemp" required>
        </div>
        <div class="input-group">
          <label>최저 온도 (℃)</label>
          <input type="number" step="0.1" name="minTemp" required>
        </div>
        <div class="input-group">
          <label>최고 온도 (℃)</label>
          <input type="number" step="0.1" name="maxTemp" required>
        </div>
        <div class="input-group">
          <label>점검자명</label>
          <input type="text" name="checker" required>
        </div>
        <button type="button" onclick="submitData()">기록하기</button>
      </form>
      <div id="status"></div>

      <h3 style="margin-top:40px; font-size:16px;">최근 기록 (5건)</h3>
      <table class="log-table" id="logTable">
        <thead>
          <tr>
            <th>날짜</th><th>장비</th><th>현재</th><th>최저</th><th>최고</th><th>점검자</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>

    <script>
      // 페이지 로드 시 최근 기록 불러오기
      window.onload = loadLogs;

      function loadLogs() {
        google.script.run.withSuccessHandler(function(data) {
          const tbody = document.getElementById('logBody');
          tbody.innerHTML = "";
          data.reverse().forEach(row => {
            const tr = document.createElement('tr');
            // 시트 열: [날짜(0), 시간(1), 조제실(2), 장비명(3), 현재(4), 최저(5), 최고(6), 점검자(7)]
            tr.innerHTML = `<td>${row[0].toString().split('T')[0]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]}</td><td>${row[6]}</td><td>${row[7]}</td>`;
            tbody.appendChild(tr);
          });
        }).getLastLogs();
      }

      function submitData() {
        const form = document.getElementById('tempForm');
        const status = document.getElementById('status');
        status.innerText = "전송 중...";
        status.style.color = "blue";
        
        google.script.run
          .withSuccessHandler(function(response) {
            status.innerText = response.message;
            if(response.status === "success") {
              status.style.color = "green";
              form.reset();
              loadLogs(); // 테이블 새로고침
            } else {
              status.style.color = "red";
            }
          })
          .addTemperatureData(form);
      }
    </script>
  </body>
</html>
