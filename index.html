<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>온도 점검 시스템</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#2c7be5;
color:white;
}

.deviceBtn{
background:#4caf50;
}

input, select{
width:100%;
padding:14px;
font-size:18px;
margin-top:10px;
}

.hidden{
display:none;
}

.status{
font-size:14px;
margin-top:5px;
color:#333;
}

#result{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>온도 점검</h2>

<!-- 사용자 입력 -->

<div id="userPage">

<p>사용자 이름</p>

<input id="username" placeholder="이름 입력">

<button onclick="saveUser()">다음</button>

</div>


<!-- 조제실 선택 -->

<div id="roomPage" class="hidden">

<p>조제실 선택</p>

<button onclick="selectRoom('지하2층 병동약국')">지하2층 병동약국</button>
<button onclick="selectRoom('0층 외래약국')">0층 외래약국</button>
<button onclick="selectRoom('3층 항암조제실')">3층 항암조제실</button>

</div>


<!-- 장비 목록 -->

<div id="devicePage" class="hidden">

<h3 id="roomTitle"></h3>

<div id="deviceList"></div>

<button onclick="backRoom()">← 조제실 선택</button>

</div>


<!-- 온도 입력 -->

<div id="inputPage" class="hidden">

<h3 id="deviceTitle"></h3>

<input id="temp" type="number" step="0.1" placeholder="온도 입력">

<select id="time">
<option value="오전">오전</option>
<option value="오후">오후</option>
</select>

<button onclick="saveData()">저장</button>

<button onclick="backDevice()">← 장비 목록</button>

<p id="result"></p>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwu3LEjzv7RRulDnfngUaqrkUS1a70rTLcJ4KHrS6hAv3MF52vMYguDSkBkzRy4NDQE/exec"

let user=""
let room=""
let device=""

const devices=[
"냉장고1",
"냉장고2",
"냉장고3",
"실내온도"
]


function saveUser(){

user=document.getElementById("username").value

if(user==""){
alert("이름을 입력하세요")
return
}

document.getElementById("userPage").classList.add("hidden")
document.getElementById("roomPage").classList.remove("hidden")

}


function selectRoom(r){

room=r

document.getElementById("roomTitle").innerText=r

document.getElementById("roomPage").classList.add("hidden")
document.getElementById("devicePage").classList.remove("hidden")

loadStatus()

}


function backRoom(){

document.getElementById("devicePage").classList.add("hidden")
document.getElementById("roomPage").classList.remove("hidden")

}


function backDevice(){

document.getElementById("inputPage").classList.add("hidden")
document.getElementById("devicePage").classList.remove("hidden")

loadStatus()

}


function selectDevice(d){

device=d

document.getElementById("deviceTitle").innerText=room+" / "+device

document.getElementById("devicePage").classList.add("hidden")
document.getElementById("inputPage").classList.remove("hidden")

}


function loadStatus(){

fetch(API_URL+"?room="+encodeURIComponent(room))
.then(res=>res.json())
.then(data=>{

let html=""

devices.forEach(d=>{

let morning="❌"
let afternoon="❌"

if(data && data[d]){

if(data[d].morning) morning="✅"
if(data[d].afternoon) afternoon="✅"

}

html+=`
<button class="deviceBtn" onclick="selectDevice('${d}')">
${d}
<div class="status">오전 ${morning} / 오후 ${afternoon}</div>
</button>
`

})

document.getElementById("deviceList").innerHTML=html

})
.catch(err=>{

let html=""

devices.forEach(d=>{

html+=`
<button class="deviceBtn" onclick="selectDevice('${d}')">
${d}
<div class="status">오전 ❌ / 오후 ❌</div>
</button>
`

})

document.getElementById("deviceList").innerHTML=html

})

}


function saveData(){

let temp=document.getElementById("temp").value
let time=document.getElementById("time").value

if(temp==""){
alert("온도를 입력하세요")
return
}

let today=new Date().toISOString().split("T")[0]

let data={
date:today,
time:time,
room:room,
device:device,
temperature:temp,
inspector:user
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{

document.getElementById("result").innerText="저장 완료"
document.getElementById("temp").value=""

})
.catch(err=>{

document.getElementById("result").innerText="저장 실패"

})

}

</script>

</body>
</html>
