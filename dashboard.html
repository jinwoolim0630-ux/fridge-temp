<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온도 점검 실시간 현황판</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; }
        .container { max-width: 100%; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 15px; font-size: 20px; }
        
        /* 상단 컨트롤 바 슬림화 */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .control-group { display: flex; align-items: center; gap: 5px; }
        .label { font-weight: bold; font-size: 13px; color: #495057; }
        
        select, button { padding: 6px 10px; border-radius: 6px; border: 1px solid #ced4da; font-size: 13px; outline: none; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: 600; }

        /* 테이블 크기 및 스크롤 최적화 */
        .table-wrapper { 
            overflow: auto; 
            border-radius: 8px; 
            border: 1px solid #e9ecef; 
            max-height: 70vh; /* 화면 높이에 맞춰 조절 */
        }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1200px; }
        
        /* 열 너비 고정 및 텍스트 정렬 */
        th, td { border: 1px solid #e9ecef; padding: 8px 4px; text-align: center; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #f8f9fa; color: #495057; position: sticky; top: 0; z-index: 20; }
        
        /* 날짜 열 고정 */
        .date-col { background: #f1f3f5; font-weight: 600; width: 100px; position: sticky; left: 0; z-index: 10; }
        
        /* 완료 스타일: 텍스트만 깔끔하게 표시 */
        .cell-done { background: #d4edda; color: #155724; font-weight: bold; }
        .cell-empty { background: #fff5f5; color: #e03131; font-size: 11px; }
        
        .sub-header { font-size: 10px; background: #f1f3f5 !important; color: #868e96; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 온도 점검 실시간 현황판</h2>

    <div class="controls">
        <div class="control-group">
            <span class="label">조제실:</span>
            <select id="roomSelect" onchange="renderDashboard()">
                <option value="병동약국">병동약국</option>
                <option value="외래약국">외래약국</option>
                <option value="항암조제실">항암조제실</option>
            </select>
        </div>
        
        <div class="control-group">
            <span class="label">조회년월:</span>
            <select id="yearSelect" onchange="renderDashboard()"></select>
            <select id="monthSelect" onchange="renderDashboard()"></select>
        </div>

        <button onclick="fetchData()">🔄 데이터 새로고침</button>
    </div>

    <div class="table-wrapper">
        <table id="statusTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 배포한 현황판용 GAS 웹 앱 URL을 입력하세요.
    const DASHBOARD_GAS_URL = "https://script.google.com/macros/s/AKfycby8aZm5SP4y55lI7vkIY7Y_e3ybYLQ7-HM1Wgoid9rnzxfJLFLWdo2M4lpDm7mk9l2EfQ/exec";
    
    // 장비 리스트 (실온 -> 실내온도로 수정)
    const devices = {
        "병동약국": ["냉장고1", "냉장고2", "냉장고3", "냉장고4", "냉장고5", "냉장고6", "냉장고7", "냉장고8", "냉동고1", "실내온도1", "실내온도2", "실내온도3", "실내온도4"],
        "외래약국": ["냉장고1", "실내온도1"],
        "항암조제실": ["냉장고1", "냉장고2", "냉장고3", "실내온도1"]
    };

    let rawData = [];

    document.addEventListener('DOMContentLoaded', async () => {
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const roomSelect = document.getElementById('roomSelect');
        const now = new Date();
        
        // 1. URL 파라미터를 통한 조제실 자동 선택
        const urlParams = new URLSearchParams(window.location.search);
        const roomParam = urlParams.get('room');
        if (roomParam && devices[roomParam]) {
            roomSelect.value = roomParam;
        }

        // 2. 년도 및 월 선택 옵션 생성 (현재 날짜 기준)
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;

        for (let y = currentYear - 1; y <= currentYear + 1; y++) {
            const opt = document.createElement('option');
            opt.value = y; opt.innerText = y + "년";
            if (y === currentYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        for (let m = 1; m <= 12; m++) {
            const opt = document.createElement('option');
            opt.value = m; opt.innerText = m + "월";
            if (m === currentMonth) opt.selected = true;
            monthSelect.appendChild(opt);
        }

        // 3. 서버 데이터 호출
        await fetchData();
    });

    async function fetchData() {
        try {
            const response = await fetch(DASHBOARD_GAS_URL);
            rawData = await response.json(); 
            renderDashboard();
        } catch (e) {
            console.error("데이터 로드 실패", e);
        }
    }

    function renderDashboard() {
        const room = document.getElementById('roomSelect').value;
        const year = parseInt(document.getElementById('yearSelect').value);
        const month = parseInt(document.getElementById('monthSelect').value);
        const roomDevices = devices[room];
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        
        if (!roomDevices) return;

        // 테이블 헤더 생성 (장비명 및 오전/오후)
        let htmlHead = `<tr><th rowspan="2" class="date-col">날짜</th>`;
        roomDevices.forEach(d => htmlHead += `<th colspan="2" style="width: 110px;">${d}</th>`);
        htmlHead += `</tr><tr>`;
        roomDevices.forEach(() => htmlHead += `<th class="sub-header">오전</th><th class="sub-header">오후</th>`);
        htmlHead += `</tr>`;
        head.innerHTML = htmlHead;

        // 해당 월의 1일부터 말일까지 행 생성 (정순)
        let htmlBody = "";
        const lastDay = new Date(year, month, 0).getDate();

        for (let d = 1; d <= lastDay; d++) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            htmlBody += `<tr><td class="date-col">${dateStr}</td>`;
            
            roomDevices.forEach(dev => {
                ["오전", "오후"].forEach(time => {
                    // 서버 데이터(rawData) 내 일치 여부 확인
                    const isDone = rawData.includes(`${room}|${dev}|${time}|${dateStr}`); 
                    const cellClass = isDone ? "cell-done" : "cell-empty";
                    const cellText = isDone ? "완료" : "미점검"; 
                    htmlBody += `<td class="${cellClass}">${cellText}</td>`;
                });
            });
            htmlBody += `</tr>`;
        }
        body.innerHTML = htmlBody;
    }
</script>
</body>
</html>
