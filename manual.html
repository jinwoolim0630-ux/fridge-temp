<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>온도 점검 실시간 현황판</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f0f2f5; }
        .table-wrapper { overflow: auto; border: 1px solid #e9ecef; max-height: 75vh; border-radius: 8px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1200px; }
        th, td { border: 1px solid #e9ecef; padding: 8px; text-align: center; font-size: 12px; }
        
        /* 헤더 고정 로직 */
        .main-header th { position: sticky; top: 0; z-index: 30; background: #f8f9fa; border-bottom: 1px solid #dee2e6; }
        .sub-header-row th { position: sticky; top: 33px; z-index: 25; background: #f1f3f5; font-size: 10px; }
        .date-col { position: sticky; left: 0; z-index: 40; background: #f1f3f5; font-weight: bold; border-right: 2px solid #dee2e6; }
        thead tr:first-child th:first-child { z-index: 50; }

        .temp-normal { background: #d4edda; color: #155724; font-weight: bold; }
        .temp-error { background: #f8d7da; color: #721c24; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <select id="roomSelect" onchange="renderDashboard()">
            <option value="병동약국">병동약국</option>
        </select>
        <div class="table-wrapper">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
<script>
    const DASHBOARD_GAS_URL = "본인의_GAS_URL_입력";
    const devices = { "병동약국": ["냉장고1", "냉장고2", "냉장고3", "실내온도1"] };
    let rawData = [];

    async function fetchData() {
        const response = await fetch(DASHBOARD_GAS_URL);
        rawData = await response.json();
        renderDashboard();
    }

    function renderDashboard() {
        const room = document.getElementById('roomSelect').value;
        const roomDevices = devices[room];
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;

        let htmlHead = `<tr class="main-header"><th rowspan="2" class="date-col">날짜</th>`;
        roomDevices.forEach(d => htmlHead += `<th colspan="2">${d}</th>`);
        htmlHead += `</tr><tr class="sub-header-row">`;
        roomDevices.forEach(() => htmlHead += `<th>오전</th><th>오후</th>`);
        htmlHead += `</tr>`;
        head.innerHTML = htmlHead;

        let htmlBody = "";
        const lastDay = new Date(year, month, 0).getDate();
        for (let d = 1; d <= lastDay; d++) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            htmlBody += `<tr><td class="date-col">${dateStr}</td>`;
            roomDevices.forEach(dev => {
                ["오전", "오후"].forEach(time => {
                    const entry = rawData.find(r => r.date === dateStr && r.room === room && r.device === dev && r.time === time);
                    const cellClass = entry ? (entry.status === "ERROR" ? "temp-error" : "temp-normal") : "";
                    const cellValue = entry ? entry.temp.toFixed(1) : "";
                    htmlBody += `<td class="${cellClass}">${cellValue}</td>`;
                });
            });
            htmlBody += `</tr>`;
        }
        body.innerHTML = htmlBody;
    }
    window.onload = fetchData;
</script>
</body>
</html>
