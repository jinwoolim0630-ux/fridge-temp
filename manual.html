<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>온도 점검 시스템 (실시간 동기화)</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f4f7f6; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; border-bottom: 3px solid #007bff; padding-bottom: 10px; }
        .label { font-size: 14px; color: #666; margin: 15px 0 5px; font-weight: bold; }
        input, button, select { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-secondary { background: #6c757d; margin-top: 10px; }
        .hidden { display: none !important; }
        .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .device-card { padding: 15px; border: 1px solid #007bff; border-radius: 8px; text-align: center; background: #fff; cursor: pointer; font-weight: bold; color: #007bff; position: relative; }
        
        /* 점검 완료 스타일: 초록색 배경 및 문구 추가 */
        .device-card.completed {
            background: #28a745 !important;
            color: white !important;
            border-color: #1e7e34 !important;
        }
        .device-card.completed::after {
            content: "✓ 점검완료";
            display: block;
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .section-title { grid-column: span 2; background: #e9ecef; padding: 5px; font-size: 13px; color: #495057; border-radius: 4px; margin-top: 10px; }
        #reader { width: 100%; border-radius: 10px; background: #000; overflow: hidden; margin-top: 10px; }
        .status-box { background: #eef7ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; border: 1px dashed #007bff; }
    </style>
</head>
<body>

<div class="container">
    <h2>온도 점검 관리</h2>

    <div id="step-1">
        <div class="label">점검자 성함</div>
        <input type="text" id="userName" placeholder="이름을 입력하세요">
        
        <div class="label">점검 회차 (오전/오후 선택)</div>
        <select id="checkTime" onchange="updateDeviceList()">
            <option value="오전">오전 점검</option>
            <option value="오후">오후 점검</option>
        </select>

        <div class="label">조제실 선택</div>
        <select id="roomSelect" onchange="updateDeviceList()">
            <option value="병동약국" selected>병동약국</option>
            <option value="외래약국">외래약국</option>
            <option value="항암조제실">항암조제실</option>
        </select>

        <div id="device-list-area">
            <div id="device-grid" class="device-grid"></div>
        </div>
        
        <button class="btn-secondary" onclick="fetchStatus()">🔄 점검 상태 새로고침</button>
    </div>

    <div id="step-2" class="hidden">
        <div class="status-box">선택된 장비: <span id="selected-info"></span></div>
        <div id="reader"></div>
        <button class="btn-secondary" onclick="backToStep1()">이전 화면으로</button>
    </div>

    <div id="step-3" class="hidden">
        <div class="status-box">✅ 인증 완료: <span id="selected-info-final"></span></div>
        <div class="label">현재 온도 (℃)</div>
        <input type="number" id="tempValue" step="0.1" inputmode="decimal" placeholder="온도 입력">
        <button id="submitBtn" onclick="submitData()">데이터 저장 및 완료</button>
        <button class="btn-secondary" onclick="backToStep1()">취소</button>
    </div>
</div>

<script>
    // 배포한 구글 앱스 스크립트 URL을 반드시 확인하세요
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwBhqH5uR-8jPOj5VUO5jZ3HDEOzcmL3AmxWdyqGNOzvz1RK-fEaVe2qP95EJvAmOKL/exec";
    
    const devices = {
        "병동약국": {
            "냉장/냉동고": ["냉장고1", "냉장고2", "냉장고3", "냉장고4", "냉장고5", "냉장고6", "냉장고7", "냉장고8", "냉동고1"],
            "실내온도": ["실내온도1", "실내온도2", "실내온도3", "실내온도4"]
        },
        "외래약국": { "장비": ["냉장고1", "실내온도1"] },
        "항암조제실": { "장비": ["냉장고1", "실내온도1"] }
    };

    let selectedRoom = "", selectedDevice = "", html5QrCode;
    let completedItems = []; // 서버에서 받아온 완료 목록 저장 변수

    document.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('hospital_user_name');
        if (savedName) document.getElementById('userName').value = savedName;
        
        fetchStatus(); // 페이지 로드 시 즉시 서버 데이터 조회
    });

    // 서버(구글 시트)에서 오늘 점검된 목록 가져오기
    async function fetchStatus() {
        try {
            const response = await fetch(GAS_URL);
            if (!response.ok) throw new Error('서버 응답 없음');
            completedItems = await response.json(); // 서버에서 ["조제실|장비|회차", ...] 형태 수신
            updateDeviceList();
        } catch (e) {
            console.error("데이터 동기화 실패:", e);
            updateDeviceList(); 
        }
    }

    function updateDeviceList() {
        const room = document.getElementById('roomSelect').value;
        const grid = document.getElementById('device-grid');
        const checkTime = document.getElementById('checkTime').value; // 현재 선택된 오전/오후
        
        if (!room) { grid.innerHTML = ""; return; }
        selectedRoom = room; grid.innerHTML = "";
        
        const roomData = devices[room];
        for (const category in roomData) {
            const title = document.createElement('div'); 
            title.className = 'section-title'; 
            title.innerText = `● ${category}`; 
            grid.appendChild(title);

            roomData[category].forEach(dev => {
                const card = document.createElement('div'); 
                card.className = 'device-card'; 
                card.innerText = dev;
                
                // 현재 회차(오전/오후)에 완료된 기록이 있는지 대조
                const itemKey = `${room}|${dev}|${checkTime}`;
                if (completedItems.includes(itemKey)) {
                    card.classList.add('completed');
                }
                
                card.onclick = () => startScan(dev); 
                grid.appendChild(card);
            });
        }
    }

    // ... (startScan, showInputScreen, backToStep1 함수는 기존과 동일)

    async function submitData() {
        const temp = document.getElementById('tempValue').value;
        const checkTime = document.getElementById('checkTime').value;
        const user = document.getElementById('userName').value;
        const btn = document.getElementById('submitBtn');

        if (!temp) { alert("온도를 입력하세요."); return; }

        btn.disabled = true;
        btn.innerText = "저장 중...";

        const payload = { user, room: selectedRoom, device: selectedDevice, temp, checkTime };

        try {
            // 데이터 저장 (POST)
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            // 저장 직후 로컬 목록에도 추가하여 즉시 반영
            completedItems.push(`${selectedRoom}|${selectedDevice}|${checkTime}`);
            
            alert(selectedDevice + " (" + checkTime + ") 점검 완료!");
            btn.disabled = false;
            btn.innerText = "데이터 저장 및 완료";
            backToStep1();
            updateDeviceList(); 
        } catch (e) {
            alert("전송 중 오류가 발생했습니다.");
            btn.disabled = false;
        }
    }
    
    // 기존 QR 스캔 로직들...
    function startScan(device) {
        const user = document.getElementById('userName').value.trim();
        if (!user) { alert("성함을 입력해주세요."); return; }
        localStorage.setItem('hospital_user_name', user);
        selectedDevice = device;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        document.getElementById('selected-info').innerText = device;
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            if (decodedText === `${selectedRoom}|${selectedDevice}`) {
                html5QrCode.stop().then(() => showInputScreen());
            } else { alert("QR 정보가 일치하지 않습니다."); }
        }).catch(() => alert("카메라 오류"));
    }
    function showInputScreen() {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        document.getElementById('selected-info-final').innerText = selectedDevice;
        document.getElementById('tempValue').focus();
    }
    function backToStep1() {
        if (html5QrCode && html5QrCode.isScanning) { html5QrCode.stop(); }
        document.getElementById('step-1').classList.remove('hidden');
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('tempValue').value = "";
    }
</script>
</body>
</html>
