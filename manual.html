<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>온도 점검 관리 시스템</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f4f7f6; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        .label { font-size: 14px; color: #666; margin: 10px 0 5px; font-weight: bold; }
        input, button, select { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-secondary { background: #6c757d; margin-top: 5px; }
        .hidden { display: none !important; }
        .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .device-card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center; background: #fff; cursor: pointer; font-weight: bold; }
        .device-card:active { background: #e9ecef; }
        #reader { width: 100%; border-radius: 10px; background: #000; overflow: hidden; }
        .status-box { background: #eef7ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>온도 관리 (통합)</h2>

    <div id="step-1">
        <div class="label">점검자 성함</div>
        <input type="text" id="userName" placeholder="이름을 입력하세요">
        <div class="label">조제실 선택</div>
        <select id="roomSelect" onchange="updateDeviceList()">
            <option value="">-- 조제실을 선택하세요 --</option>
            <option value="외래약국">외래약국</option>
            <option value="병동약국">병동약국</option>
            <option value="항암조제실">항암조제실</option>
        </select>
        <div id="device-list-area" class="hidden">
            <div class="label">점검 대상 장비 선택</div>
            <div id="device-grid" class="device-grid"></div>
        </div>
    </div>

    <div id="step-2" class="hidden">
        <div class="status-box" id="selected-info"></div>
        <p style="text-align:center;">장비의 QR코드를 찍어주세요.</p>
        <div id="reader"></div>
        <button class="btn-secondary" onclick="backToStep1()">뒤로 가기</button>
    </div>

    <div id="step-3" class="hidden">
        <div class="status-box" id="selected-info-final"></div>
        <div class="label">점검 회차</div>
        <select id="checkTime">
            <option value="오전">오전 점검</option>
            <option value="오후">오후 점검</option>
        </select>
        <div class="label">현재 온도 (℃)</div>
        <input type="number" id="tempValue" step="0.1" inputmode="decimal" placeholder="온도 입력">
        <button id="submitBtn" onclick="submitData()">데이터 저장하기</button>
        <button class="btn-secondary" onclick="backToStep1()">취소</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYpJ_AELXK_Tni7vOC5D9SRH98TNweFFT3oTUTrFlR241XMxbWb3bV0kPqgEgnHZ7y/exec";
    
    // 조제실별 장비 데이터
    const devices = {
        "외래약국": ["냉장고1", "냉장고2", "실내온도1"],
        "병동약국": ["냉장고1", "냉장고2", "냉장고3", "실내온도1"],
        "항암조제실": ["냉장고1", "실내온도1"]
    };

    let selectedRoom = "";
    let selectedDevice = "";
    let html5QrCode;

    document.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('hospital_user_name');
        if (savedName) document.getElementById('userName').value = savedName;
    });

    // 조제실 선택 시 장비 목록 표시
    function updateDeviceList() {
        const room = document.getElementById('roomSelect').value;
        const grid = document.getElementById('device-grid');
        const area = document.getElementById('device-list-area');
        
        if (!room) { area.classList.add('hidden'); return; }
        
        selectedRoom = room;
        grid.innerHTML = "";
        devices[room].forEach(dev => {
            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerText = dev;
            card.onclick = () => startScan(dev);
            grid.appendChild(card);
        });
        area.classList.remove('hidden');
    }

    // QR 스캔 시작
    function startScan(device) {
        const user = document.getElementById('userName').value.trim();
        if (!user) { alert("이름을 먼저 입력해주세요."); return; }
        localStorage.setItem('hospital_user_name', user);
        
        selectedDevice = device;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        document.getElementById('selected-info').innerText = `${selectedRoom} - ${selectedDevice}`;
        
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            // QR 인증: '조제실|장비명'이 일치하는지 확인
            if (decodedText === `${selectedRoom}|${selectedDevice}`) {
                html5QrCode.stop().then(() => {
                    showInputScreen();
                });
            } else {
                alert("일치하지 않는 장비 QR입니다. 올바른 장비를 찍어주세요.");
            }
        }).catch(err => alert("카메라를 켤 수 없습니다."));
    }

    function showInputScreen() {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        document.getElementById('selected-info-final').innerText = `인증완료: ${selectedRoom} - ${selectedDevice}`;
    }

    async function submitData() {
        const temp = document.getElementById('tempValue').value;
        const checkTime = document.getElementById('checkTime').value;
        const user = document.getElementById('userName').value;
        const btn = document.getElementById('submitBtn');

        if (!temp) { alert("온도를 입력하세요."); return; }

        btn.disabled = true;
        const payload = { user, room: selectedRoom, device: selectedDevice, temp, checkTime };

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            alert("저장되었습니다.");
            backToStep1();
        } catch (e) {
            alert("저장 중 오류 발생");
            btn.disabled = false;
        }
    }

    function backToStep1() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop();
        }
        document.getElementById('step-1').classList.remove('hidden');
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('tempValue').value = "";
    }
</script>
</body>
</html>
